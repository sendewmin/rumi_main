spring.application.name=rumi_backend_v2

# ─── MySQL / DataSource ─────────────────────────────────────────────────────
# DB_URL should be just the host, e.g. jdbc:mysql://localhost:3306
spring.datasource.url=jdbc:mysql://localhost:3306/rumi_rental_db
spring.datasource.username=root
spring.datasource.password=Root123@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# 'validate' — Hibernate checks schema but does NOT create tables (Flyway handles that)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true: safe to run even if the DB already has tables but no flyway history
spring.flyway.baseline-on-migrate=true

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.org.flywaydb=INFO
logging.level.com.rumi=DEBUG