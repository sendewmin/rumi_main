spring.application.name=rumi_backend_v2

# ─── PostgreSQL / DataSource (Supabase) ───────────────────────────────────
# Connection details picked from env.properties
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?user=postgres.uuicntunejvvwzfcypey&password=Y3T9VnHSMZIoQ29j
spring.datasource.username=postgres.uuicntunejvvwzfcypey
spring.datasource.password=Y3T9VnHSMZIoQ29j
spring.datasource.driver-class-name=org.postgresql.Driver

# Limit Hikari connection pool so we don't hit Supabase's Session mode MaxClients limit (pool_size=15)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
# 'validate' — Hibernate checks schema but does NOT create tables (Flyway handles that)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway ─────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true: safe to run even if the DB already has tables but no flyway history
spring.flyway.baseline-on-migrate=true

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.org.flywaydb=INFO
logging.level.com.rumi=DEBUG